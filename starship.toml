# ~/.config/starship.toml

# Inserts a blank line between shell prompts
add_newline = true

# Change the default prompt format
format = """\
[Ôò¡Ôò┤](238)$os\
$all[Ôò░ÔöÇ](238)$character"""

# Change the default prompt characters
[character]
success_symbol = '[¯¬£](238)'
error_symbol = '[¯¬£](238)'

# ---

[os]
format ='[$symbol](bold blue)'   
disabled = false

[os.symbols]
Windows = '¯ÿ¬ '
Arch = '¾░úç'
Ubuntu = '´îø'

# ---

# Shows the username
[username]
style_user = 'white bold'
style_root = 'black bold'
format = '[$user]($style) '
disabled = true  # disable in powershell
show_always = false

# Shows current directory
[directory]
truncation_length = 1
# truncation_symbol = 'ÔÇª/'
home_symbol = '¾░ï× ~'
read_only_style = '197'
read_only = ' ´Çú '
format = 'at [$path]($style)[$read_only]($read_only_style) '

# Shows current git branch
[git_branch]
symbol = '¾░èó '
format = 'on [$symbol$branch]($style) '
# truncation_length = 4
truncation_symbol = 'ÔÇª/'
style = 'bold green'

# Shows current git
[git_status]
format = '[\($all_status$ahead_behind\)]($style) '
style = 'bold green'
conflicted = '­ƒÅ│'
up_to_date = '´üå '
untracked = '´ö® '
ahead = 'Ôçí${count}'
diverged = 'ÔçòÔçí${ahead_count}Ôçú${behind_count}'
behind = 'Ôçú${count}'
stashed = '¾░Åù '
modified = '´üä '
staged = '[++\($count\)](green)'
renamed = '¾░ûÀ '
deleted = '´Çö '

# Shows kubernetes context and namespace
[kubernetes]
format = 'via [¾▒â¥ $context\($namespace\)](bold purple) '
disabled = false

